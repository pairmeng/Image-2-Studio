name: Build and Publish Docker Image

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to build
        required: false
        default: main
      publish:
        description: Push the built image to GHCR
        required: false
        type: boolean
        default: false
      channel:
        description: Image publish channel
        required: false
        type: choice
        default: dev
        options:
          - dev
          - release

permissions:
  contents: read
  packages: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/image-2-studio
  PLATFORM: linux/amd64
  NPM_REGISTRY: https://registry.npmjs.org/
  PNPM_VERSION: 11.1.2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v5

      - name: Checkout selected ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify application
        run: pnpm verify

      - name: Dependency audit report
        run: pnpm audit --audit-level moderate --json > pnpm-audit.json
        continue-on-error: true

      - name: Upload dependency audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pnpm-audit
          path: pnpm-audit.json
          if-no-files-found: ignore

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: (github.event_name == 'workflow_dispatch' && inputs.publish) || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: meta
        shell: bash
        env:
          SELECTED_REF: ${{ inputs.ref }}
          SELECTED_PUBLISH: ${{ inputs.publish }}
          SELECTED_CHANNEL: ${{ inputs.channel }}
        run: |
          publish="false"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            tags="${IMAGE_NAME}:pr-${{ github.event.pull_request.number }}"
            version="pr-${{ github.event.pull_request.number }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            publish="${SELECTED_PUBLISH}"
            channel="${SELECTED_CHANNEL:-dev}"
            ref="${SELECTED_REF:-main}"
            version="${ref#refs/tags/}"
            version="${version#refs/heads/}"
            version="${version//\//-}"
            short_sha="$(git rev-parse --short HEAD)"

            if [[ "${channel}" == "dev" ]]; then
              version="dev-${short_sha}"
              tags="${IMAGE_NAME}:dev-latest,${IMAGE_NAME}:dev-${short_sha}"
            elif [[ "${channel}" == "release" ]]; then
              tags="${IMAGE_NAME}:${version}"

              if [[ "${publish}" == "true" ]]; then
                if [[ "${version}" != v* ]]; then
                  echo "Release publishing requires a v* ref; got ${ref}." >&2
                  exit 1
                fi

                tags="${tags},${IMAGE_NAME}:latest"
              fi
            else
              echo "Unknown publish channel: ${channel}" >&2
              exit 1
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            publish="true"
            tags="${IMAGE_NAME}:${GITHUB_REF_NAME},${IMAGE_NAME}:latest"
            version="${GITHUB_REF_NAME}"
          else
            version="${GITHUB_REF_NAME//\//-}"
            tags="${IMAGE_NAME}:${version}"
          fi

          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"

      - name: Build and optionally push Docker image
        id: docker-build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: ${{ steps.meta.outputs.publish == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NPM_REGISTRY=${{ env.NPM_REGISTRY }}
            PNPM_VERSION=${{ env.PNPM_VERSION }}
            APP_VERSION=${{ steps.meta.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          if-no-files-found: ignore

      - name: Scan filesystem vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
          if-no-files-found: ignore
