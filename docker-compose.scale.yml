services:
  image-2-migrate:
    image: ${IMAGE_NAME:-ghcr.io/paimonria/image-2-studio}:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: "no"
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      IMAGE_PROCESS_ROLE: migrate
      DB_MIGRATE_ON_START: "true"
      DB_MIGRATE_ATTEMPTS: ${DB_MIGRATE_ATTEMPTS:-12}
      DB_MIGRATE_RETRY_SECONDS: ${DB_MIGRATE_RETRY_SECONDS:-5}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      IMAGE_QUEUE_PREFIX: ${IMAGE_QUEUE_PREFIX:-image2}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://image2:${POSTGRES_PASSWORD:-change-me}@postgres:5432/image2?schema=public&connection_limit=${MIGRATE_DATABASE_CONNECTION_LIMIT:-5}}
    volumes:
      - ./storage:/app/storage
    profiles:
      - migrate
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  image-2-studio:
    container_name: null
    ports: []
    expose:
      - "3000"
    environment:
      DB_MIGRATE_ON_START: "false"
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://image2:${POSTGRES_PASSWORD:-change-me}@postgres:5432/image2?schema=public&connection_limit=${DATABASE_CONNECTION_LIMIT:-5}}
    deploy:
      replicas: ${WEB_REPLICAS:-2}

  image-2-worker:
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://image2:${POSTGRES_PASSWORD:-change-me}@postgres:5432/image2?schema=public&connection_limit=${WORKER_DATABASE_CONNECTION_LIMIT:-5}}
      IMAGE_WORKER_CONCURRENCY: ${IMAGE_WORKER_CONCURRENCY:-4}
    deploy:
      replicas: ${WORKER_REPLICAS:-2}

  image-2-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      image-2-studio:
        condition: service_started
    ports:
      - "${APP_PORT:-3000}:80"
    volumes:
      - ./deploy/nginx/scale.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
